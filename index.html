<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass CHubut - Portal Oficial de Accesos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006672">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f9fa; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .ocean-gradient { background: linear-gradient(135deg, #006672 0%, #004d55 100%); }
        .mp-blue { background-color: #009EE3; }
        .btn-primary { background-color: #006672; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #004d55; transform: translateY(-1px); }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #006672; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- Header Navigation -->
    <header class="w-full max-w-2xl bg-white shadow-sm sticky top-0 z-50 p-4 flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-2">
            <i class="fas fa-map-marked-alt text-[#006672] text-2xl"></i>
            <div>
                <h1 class="text-lg font-extrabold text-[#006672] leading-none">Chubut Pass</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Oficial</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="showTab('reserves')" id="nav-reserves" class="text-[#006672] font-bold text-sm border-b-2 border-[#006672] pb-1">Reservas</button>
            <button onclick="showTab('tickets')" id="nav-tickets" class="text-gray-400 font-bold text-sm pb-1">Mis Pases</button>
            <button onclick="showTab('admin')" id="nav-admin" class="text-gray-400 font-bold text-sm pb-1">Admin</button>
        </div>
    </header>

    <main class="w-full max-w-2xl p-4 space-y-6 pb-24">

        <!-- Tab: Reserves -->
        <section id="tab-reserves" class="animate-fade space-y-6">
            <div class="relative w-full h-48 rounded-2xl overflow-hidden shadow-xl">
                <img src="https://images.unsplash.com/photo-1590012314607-cda9d9b699ae?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Chubut">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-6 flex flex-col justify-end">
                    <p class="text-amber-400 font-bold text-sm">Ecoturismo Responsable</p>
                    <h2 class="text-white text-2xl font-black">Reserva de Ingresos</h2>
                </div>
            </div>
            <div id="reserve-container" class="space-y-4"></div>
        </section>

        <!-- Tab: My Tickets -->
        <section id="tab-tickets" class="hidden animate-fade space-y-4">
            <h3 class="text-gray-800 font-extrabold text-lg flex items-center gap-2">
                <i class="fas fa-ticket-alt text-[#006672]"></i> Historial de Pases
            </h3>
            <div id="tickets-container" class="space-y-4"></div>
        </section>

        <!-- Tab: Admin -->
        <section id="tab-admin" class="hidden animate-fade space-y-6">
            <h3 class="text-gray-800 font-extrabold text-lg flex items-center gap-2">
                <i class="fas fa-user-shield text-[#006672]"></i> Panel de Gestión
            </h3>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Recaudación</p>
                    <p id="admin-revenue" class="text-xl font-black text-[#006672]">$0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Pases Emitidos</p>
                    <p id="admin-count" class="text-xl font-black text-[#006672]">0</p>
                </div>
            </div>

            <!-- Price Editor -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <h4 class="font-bold text-gray-700 border-b pb-2">Configuración de Tarifas</h4>
                <div id="price-editor-list" class="space-y-3"></div>
                <button onclick="savePrices()" class="w-full btn-primary py-3 rounded-xl font-bold text-sm">Guardar Cambios</button>
            </div>
        </section>
    </main>

    <!-- Modal de Compra -->
    <div id="buy-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl max-h-[90vh] overflow-y-auto animate-fade">
            <div class="sticky top-0 bg-white p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-[#006672]">Comprar Entrada</h3>
                <button onclick="closeModal()" class="text-gray-400"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div class="p-6 space-y-6">
                <div class="space-y-2">
                    <input type="text" id="form-name" placeholder="Nombre y Apellido" class="w-full p-3 rounded-xl border outline-none">
                    <input type="text" id="form-doc" placeholder="DNI / Pasaporte" class="w-full p-3 rounded-xl border outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select id="form-residency" onchange="updatePrice()" class="p-3 rounded-xl border outline-none">
                        <option value="Chubut">Chubut</option>
                        <option value="Nacional">Nacional</option>
                        <option value="Extranjero">Extranjero</option>
                    </select>
                    <select id="form-category" onchange="updatePrice()" class="p-3 rounded-xl border outline-none">
                        <option value="Mayor">Mayor</option>
                        <option value="Menor">Menor / Jub.</option>
                    </select>
                </div>

                <div class="bg-[#006672]/5 p-4 rounded-2xl flex justify-between items-center">
                    <p id="price-detail" class="text-xs font-bold text-[#006672]">Residente Chubut</p>
                    <p id="total-price" class="text-2xl font-black text-[#006672]">$10,000</p>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-gray-500 uppercase">Seleccione Método de Pago</p>
                    <button onclick="processPurchase('MP')" class="w-full mp-blue text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 shadow-md">
                        <img src="https://logotipous.com/wp-content/uploads/2021/11/Mercado-Pago-Logo.png" class="h-4 bg-white p-0.5 rounded px-1"> Pagar con Mercado Pago
                    </button>
                    <button onclick="processPurchase('CARD')" class="w-full ocean-gradient text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 shadow-md">
                        <i class="fas fa-credit-card"></i> Tarjeta de Débito/Crédito
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const reserves = [
            { id: 'pv', name: 'Península Valdés', loc: 'Pto. Madryn', alert: 'Vientos fuertes.' },
            { id: 'pt', name: 'Punta Tombo', loc: 'Rawson', alert: null },
            { id: 'bs', name: 'Bosque Sarmiento', loc: 'Sarmiento', alert: 'Calor extremo.' }
        ];

        let defaultPrices = {
            'Chubut_Mayor': 10000, 'Chubut_Menor': 8000,
            'Nacional_Mayor': 18000, 'Nacional_Menor': 10000,
            'Extranjero_Mayor': 50000, 'Extranjero_Menor': 35000
        };

        let prices = JSON.parse(localStorage.getItem('chubut_prices') || JSON.stringify(defaultPrices));
        let tickets = JSON.parse(localStorage.getItem('chubut_tickets') || '[]');
        let selectedReserve = null;

        function init() {
            renderReserves();
            renderTickets();
            renderPriceEditor();
            updateAdminStats();
        }

        function renderReserves() {
            const container = document.getElementById('reserve-container');
            container.innerHTML = reserves.map(res => `
                <div class="bg-white rounded-2xl shadow-sm border p-4 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-[#006672]">${res.name}</h4>
                        <p class="text-xs text-gray-500">${res.loc}</p>
                        ${res.alert ? `<p class="text-[9px] text-amber-600 font-bold mt-1"><i class="fas fa-exclamation-triangle"></i> ${res.alert}</p>` : ''}
                    </div>
                    <button onclick="openModal('${res.id}')" class="btn-primary text-xs font-bold px-4 py-2 rounded-lg">Comprar</button>
                </div>
            `).join('');
        }

        function renderTickets() {
            const container = document.getElementById('tickets-container');
            if (tickets.length === 0) { container.innerHTML = '<p class="text-center text-gray-400 py-10">Sin pases</p>'; return; }
            container.innerHTML = tickets.map(t => `
                <div class="bg-white rounded-2xl shadow-sm border-l-4 border-[#006672] p-4 flex gap-4 items-center">
                    <div class="flex-1">
                        <p class="text-sm font-black text-gray-800">${t.reserve}</p>
                        <p class="text-xs text-gray-500">${t.name} • ${t.date}</p>
                        <p class="text-[9px] font-mono text-[#006672] mt-1">${t.id}</p>
                    </div>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${t.id}" class="w-16 h-16">
                </div>
            `).reverse().join('');
        }

        function renderPriceEditor() {
            const list = document.getElementById('price-editor-list');
            list.innerHTML = Object.entries(prices).map(([key, val]) => `
                <div class="flex justify-between items-center text-xs">
                    <span class="font-bold text-gray-600">${key.replace('_', ' ')}</span>
                    <input type="number" id="edit-${key}" value="${val}" class="w-24 p-1 border rounded text-right outline-none">
                </div>
            `).join('');
        }

        function updateAdminStats() {
            const revenue = tickets.reduce((sum, t) => sum + (t.price || 0), 0);
            document.getElementById('admin-revenue').innerText = `$${revenue.toLocaleString()}`;
            document.getElementById('admin-count').innerText = tickets.length;
        }

        function savePrices() {
            Object.keys(prices).forEach(key => {
                prices[key] = parseInt(document.getElementById(`edit-${key}`).value);
            });
            localStorage.setItem('chubut_prices', JSON.stringify(prices));
            alert('Precios actualizados');
        }

        function showTab(tab) {
            ['reserves', 'tickets', 'admin'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`nav-${t}`).className = t === tab ? 'text-[#006672] font-bold text-sm border-b-2 border-[#006672] pb-1' : 'text-gray-400 font-bold text-sm pb-1';
            });
            if(tab === 'admin') updateAdminStats();
        }

        function openModal(resId) {
            selectedReserve = reserves.find(r => r.id === resId);
            document.getElementById('buy-modal').classList.remove('hidden');
            updatePrice();
        }

        function closeModal() { document.getElementById('buy-modal').classList.add('hidden'); }

        function updatePrice() {
            const res = document.getElementById('form-residency').value;
            const cat = document.getElementById('form-category').value;
            const key = `${res}_${cat}`;
            const price = prices[key] || 0;
            document.getElementById('total-price').innerText = `$${price.toLocaleString()}`;
            document.getElementById('price-detail').innerText = `${res} - ${cat}`;
        }

        function processPurchase(method) {
            const name = document.getElementById('form-name').value;
            const doc = document.getElementById('form-doc').value;
            if (!name || !doc) { alert('Complete los datos'); return; }

            const res = document.getElementById('form-residency').value;
            const cat = document.getElementById('form-category').value;
            const price = prices[`${res}_${cat}`];

            const btn = document.querySelector(method === 'MP' ? '.mp-blue' : '.ocean-gradient');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = method === 'MP' ? 'Redirigiendo a Mercado Pago...' : 'Procesando Tarjeta...';

            setTimeout(() => {
                const newTicket = {
                    id: 'CHBT-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                    name: name, reserve: selectedReserve.name, date: new Date().toLocaleDateString(), price: price
                };
                tickets.push(newTicket);
                localStorage.setItem('chubut_tickets', JSON.stringify(tickets));
                closeModal();
                showTab('tickets');
                renderTickets();
                btn.innerHTML = originalHtml;
            }, 2000);
        }

        init();
    </script>
</body>
</html>
