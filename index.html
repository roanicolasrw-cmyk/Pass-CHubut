<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass CHubut - Portal Oficial de Accesos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006672">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- QR Code Library for Local Generation and Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase for Online Database -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f9fa; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .ocean-gradient { background: linear-gradient(135deg, #006672 0%, #004d55 100%); }
        .mp-blue { background-color: #009EE3; }
        .btn-primary { background-color: #006672; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #004d55; transform: translateY(-1px); }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #006672; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <header class="w-full max-w-2xl bg-white shadow-sm sticky top-0 z-50 p-4 flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-2">
            <i class="fas fa-map-marked-alt text-[#006672] text-2xl"></i>
            <div>
                <h1 class="text-lg font-extrabold text-[#006672] leading-none">Chubut Pass</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Oficial</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="showTab('reserves')" id="nav-reserves" class="text-[#006672] font-bold text-sm border-b-2 border-[#006672] pb-1">Reservas</button>
            <button onclick="showTab('tickets')" id="nav-tickets" class="text-gray-400 font-bold text-sm pb-1">Mis Pases</button>
            <button onclick="showTab('admin')" id="nav-admin" class="text-gray-400 font-bold text-sm pb-1">Admin</button>
        </div>
    </header>

    <main class="w-full max-w-2xl p-4 space-y-6 pb-24">
        <section id="tab-reserves" class="animate-fade space-y-6">
            <div class="relative w-full h-48 rounded-2xl overflow-hidden shadow-xl">
                <img src="https://images.unsplash.com/photo-1590012314607-cda9d9b699ae?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Chubut">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-6 flex flex-col justify-end">
                    <p class="text-amber-400 font-bold text-sm">Ecoturismo Responsable</p>
                    <h2 class="text-white text-2xl font-black">Reserva de Ingresos</h2>
                </div>
            </div>
            <div id="reserve-container" class="space-y-4"></div>
        </section>

        <section id="tab-tickets" class="hidden animate-fade space-y-4">
            <h3 class="text-gray-800 font-extrabold text-lg flex items-center gap-2">
                <i class="fas fa-ticket-alt text-[#006672]"></i> Mis Credenciales de Grupo
            </h3>
            <div id="tickets-container" class="space-y-4"></div>
        </section>

        <section id="tab-admin" class="hidden animate-fade space-y-6">
            <h3 class="text-gray-800 font-extrabold text-lg flex items-center gap-2">
                <i class="fas fa-user-shield text-[#006672]"></i> Panel Administrativo
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Recaudación Total</p>
                    <p id="admin-revenue" class="text-xl font-black text-[#006672]">$0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Personas Admitidas</p>
                    <p id="admin-count" class="text-xl font-black text-[#006672]">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <h4 class="font-bold text-gray-700 border-b pb-2">Configuración de Tarifas</h4>
                <div id="price-editor-list" class="space-y-3"></div>
                <button onclick="savePrices()" class="w-full btn-primary py-3 rounded-xl font-bold text-sm">Guardar Cambios</button>
            </div>
        </section>
    </main>

    <!-- Modal de Compra Grupal -->
    <div id="buy-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl max-h-[90vh] flex flex-col animate-fade">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-[#006672]">Reserva Grupal</h3>
                <button onclick="closeModal()" class="text-gray-400"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="visitor-list" class="space-y-4">
                    <!-- Dinamic visitors -->
                </div>

                <button onclick="addVisitor()" class="w-full py-3 border-2 border-dashed border-[#006672] text-[#006672] font-bold rounded-xl text-sm">
                    <i class="fas fa-plus-circle"></i> Agregar Persona
                </button>

                <div class="bg-[#006672]/5 p-4 rounded-2xl flex justify-between items-center border border-[#006672]/10">
                    <div>
                        <p id="visitor-count-label" class="text-[10px] font-bold text-gray-500 uppercase">Total 1 Persona</p>
                        <p class="text-xs font-bold text-[#006672]">Pase General Unificado</p>
                    </div>
                    <p id="total-price" class="text-2xl font-black text-[#006672]">$0</p>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Método de Pago Seguro</p>
                    <button onclick="processPurchase('MP')" id="btn-mp" class="w-full mp-blue text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 shadow-lg">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Logo_Mercado_Pago.png/800px-Logo_Mercado_Pago.png" class="h-4 bg-white p-0.5 rounded px-1" alt="MP">
                        Pagar con Mercado Pago
                    </button>
                    <button onclick="processPurchase('CARD')" id="btn-card" class="w-full ocean-gradient text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 shadow-lg">
                        <i class="fas fa-credit-card"></i> Pagar con Tarjeta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION (ONLINE DATABASE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAs-DEMO-KEY",
            authDomain: "pass-chubut.firebaseapp.com",
            projectId: "pass-chubut",
            storageBucket: "pass-chubut.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        // Initialize Firebase (Using compat mode for easy single-file integration)
        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("Sistema de base de datos online activado.");
        } catch(e) {
            console.warn("Base de datos en modo local (Offline). Configure Firebase para activar persistencia online.");
        }

        const reserves = [
            { id: 'pv', name: 'Península Valdés', loc: 'Pto. Madryn', alert: 'Vientos fuertes.' },
            { id: 'pt', name: 'Punta Tombo', loc: 'Rawson', alert: null },
            { id: 'bs', name: 'Bosque Sarmiento', loc: 'Sarmiento', alert: 'Calor extremo.' }
        ];

        let defaultPrices = {
            'Chubut_Mayor': 10000, 'Chubut_Menor': 8000,
            'Nacional_Mayor': 18000, 'Nacional_Menor': 10000,
            'Extranjero_Mayor': 50000, 'Extranjero_Menor': 35000
        };

        let prices = JSON.parse(localStorage.getItem('chubut_prices') || JSON.stringify(defaultPrices));
        let tickets = [];
        let selectedReserve = null;
        let currentVisitors = [];

        async function init() {
            renderReserves();
            await syncTickets(); // Fetch from Online DB
            renderTickets();
            renderPriceEditor();
            updateAdminStats();
        }

        // --- ONLINE SYNC ---
        async function syncTickets() {
            if (db) {
                try {
                    const snapshot = await db.collection('tickets').orderBy('timestamp', 'desc').limit(20).get();
                    const onlineTickets = [];
                    snapshot.forEach(doc => onlineTickets.push(doc.data()));
                    // Merge or replace local tickets
                    if (onlineTickets.length > 0) {
                        tickets = onlineTickets;
                        localStorage.setItem('chubut_tickets', JSON.stringify(tickets));
                    }
                } catch(e) {
                    console.error("Error al sincronizar con la base de datos online:", e);
                    tickets = JSON.parse(localStorage.getItem('chubut_tickets') || '[]');
                }
            } else {
                tickets = JSON.parse(localStorage.getItem('chubut_tickets') || '[]');
            }
        }

        function renderReserves() {
            const container = document.getElementById('reserve-container');
            container.innerHTML = reserves.map(res => `
                <div class="bg-white rounded-2xl shadow-sm border p-4 flex justify-between items-center transition-all hover:shadow-md">
                    <div>
                        <h4 class="font-bold text-[#006672]">${res.name}</h4>
                        <p class="text-xs text-gray-500 leading-none">${res.loc}</p>
                        ${res.alert ? `<p class="text-[9px] text-amber-600 font-bold mt-2"><i class="fas fa-exclamation-triangle"></i> ${res.alert}</p>` : ''}
                    </div>
                    <button onclick="openModal('${res.id}')" class="btn-primary text-xs font-bold px-4 py-2 rounded-lg">Reservar</button>
                </div>
            `).join('');
        }

        function renderTickets() {
            const container = document.getElementById('tickets-container');
            if (tickets.length === 0) { container.innerHTML = '<div class="text-center py-10 opacity-30"><i class="fas fa-qrcode text-5xl"></i><p class="text-xs mt-2">Sin pases activos</p></div>'; return; }

            container.innerHTML = tickets.map((t, index) => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 animate-fade">
                    <div class="p-3 bg-[#006672] text-white flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Pase Grupal Unificado</span>
                        <span class="text-[10px] font-bold">${t.date}</span>
                    </div>
                    <div class="p-4 flex flex-col sm:flex-row gap-4 items-center">
                        <div class="flex-1 space-y-2 w-full text-center sm:text-left">
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Reserva</p>
                                <p class="text-sm font-black text-gray-800">${t.reserve}</p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase">Integrantes (${t.visitors ? t.visitors.length : 1})</p>
                                <p class="text-[11px] font-semibold text-gray-600">${t.visitors ? t.visitors.map(v => v.name).join(', ') : t.name}</p>
                            </div>
                            <p class="text-[9px] font-mono bg-gray-100 inline-block px-2 py-1 rounded text-[#006672]">ID: ${t.id}</p>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div id="qr-container-${t.id}" class="bg-white p-1 rounded-lg border shadow-inner"></div>
                            <button onclick="downloadQR('${t.id}')" class="text-[10px] bg-gray-800 text-white px-4 py-2 rounded-full font-bold flex items-center gap-2">
                                <i class="fas fa-download"></i> Descargar QR
                            </button>
                            <p class="text-[8px] font-black text-green-600 mt-1 uppercase">Válido para Acceso</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // Generate QRs locally after rendering HTML
            tickets.forEach(t => {
                const container = document.getElementById(`qr-container-${t.id}`);
                if (container) {
                    new QRCode(container, {
                        text: t.id,
                        width: 100,
                        height: 100,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            });
        }

        function downloadQR(id) {
            const container = document.getElementById(`qr-container-${id}`);
            const img = container.querySelector('img');
            const link = document.createElement('a');
            link.download = `ChubutPass_${id}.png`;
            link.href = img.src;
            link.click();
        }

        function renderPriceEditor() {
            const list = document.getElementById('price-editor-list');
            list.innerHTML = Object.entries(prices).map(([key, val]) => `
                <div class="flex justify-between items-center text-xs bg-gray-50 p-2 rounded-lg">
                    <span class="font-bold text-gray-600">${key.replace('_', ' ')}</span>
                    <div class="flex items-center gap-1">
                        <span class="text-gray-400 font-bold">$</span>
                        <input type="number" id="edit-${key}" value="${val}" class="w-20 p-1 border rounded text-right font-black text-[#006672] outline-none">
                    </div>
                </div>
            `).join('');
        }

        function updateAdminStats() {
            const revenue = tickets.reduce((sum, t) => sum + (t.totalPrice || t.price || 0), 0);
            const people = tickets.reduce((sum, t) => sum + (t.visitors ? t.visitors.length : 1), 0);
            document.getElementById('admin-revenue').innerText = `$${revenue.toLocaleString()}`;
            document.getElementById('admin-count').innerText = people;
        }

        function savePrices() {
            Object.keys(prices).forEach(key => {
                prices[key] = parseInt(document.getElementById(`edit-${key}`).value);
            });
            localStorage.setItem('chubut_prices', JSON.stringify(prices));
            alert('Configuración de tarifas actualizada en el sistema central.');
        }

        function showTab(tab) {
            ['reserves', 'tickets', 'admin'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`nav-${t}`).className = t === tab ? 'text-[#006672] font-bold text-sm border-b-2 border-[#006672] pb-1' : 'text-gray-400 font-bold text-sm pb-1';
            });
            if(tab === 'admin') updateAdminStats();
        }

        function openModal(resId) {
            selectedReserve = reserves.find(r => r.id === resId);
            currentVisitors = [{ id: Date.now(), name: '', doc: '', residency: 'Chubut', category: 'Mayor' }];
            document.getElementById('buy-modal').classList.remove('hidden');
            renderVisitors();
        }

        function closeModal() { document.getElementById('buy-modal').classList.add('hidden'); }

        function addVisitor() {
            currentVisitors.push({ id: Date.now(), name: '', doc: '', residency: 'Chubut', category: 'Mayor' });
            renderVisitors();
        }

        function removeVisitor(index) {
            if (currentVisitors.length > 1) {
                currentVisitors.splice(index, 1);
                renderVisitors();
            }
        }

        function updateVisitorData(index, field, value) {
            currentVisitors[index][field] = value;
            calculateTotal();
        }

        function renderVisitors() {
            const container = document.getElementById('visitor-list');
            container.innerHTML = currentVisitors.map((v, i) => `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 space-y-3 relative animate-fade">
                    ${i > 0 ? `<button onclick="removeVisitor(${i})" class="absolute top-2 right-2 text-red-400 text-xs"><i class="fas fa-times"></i></button>` : ''}
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Nombre completo" value="${v.name}" onchange="updateVisitorData(${i}, 'name', this.value)" class="p-3 text-xs rounded-xl border outline-none">
                        <input type="text" placeholder="DNI / Pasaporte" value="${v.doc}" onchange="updateVisitorData(${i}, 'doc', this.value)" class="p-3 text-xs rounded-xl border outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select onchange="updateVisitorData(${i}, 'residency', this.value)" class="p-3 text-[10px] font-bold rounded-xl border bg-white outline-none">
                            <option value="Chubut" ${v.residency === 'Chubut' ? 'selected' : ''}>Residente Chubut</option>
                            <option value="Nacional" ${v.residency === 'Nacional' ? 'selected' : ''}>Nacional</option>
                            <option value="Extranjero" ${v.residency === 'Extranjero' ? 'selected' : ''}>Extranjero</option>
                        </select>
                        <select onchange="updateVisitorData(${i}, 'category', this.value)" class="p-3 text-[10px] font-bold rounded-xl border bg-white outline-none">
                            <option value="Mayor" ${v.category === 'Mayor' ? 'selected' : ''}>Mayor</option>
                            <option value="Menor" ${v.category === 'Menor' ? 'selected' : ''}>Menor / Jubilado</option>
                        </select>
                    </div>
                </div>
            `).join('');
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            currentVisitors.forEach(v => {
                total += prices[`${v.residency}_${v.category}`];
            });
            document.getElementById('total-price').innerText = `$${total.toLocaleString()}`;
            document.getElementById('visitor-count-label').innerText = `Total ${currentVisitors.length} ${currentVisitors.length > 1 ? 'Personas' : 'Persona'}`;
            return total;
        }

        async function processPurchase(method) {
            const invalid = currentVisitors.some(v => !v.name || !v.doc);
            if (invalid) { alert('Complete todos los datos de los visitantes.'); return; }

            const total = calculateTotal();
            const btn = document.getElementById(method === 'MP' ? 'btn-mp' : 'btn-card');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Procesando...';
            btn.disabled = true;

            const ticketId = 'CHBT-GRP-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const newTicket = {
                id: ticketId,
                visitors: [...currentVisitors],
                reserve: selectedReserve.name,
                date: new Date().toLocaleDateString(),
                totalPrice: total,
                timestamp: Date.now()
            };

            // Save to Online DB (Firestore)
            if (db) {
                try {
                    await db.collection('tickets').doc(ticketId).set(newTicket);
                } catch(e) {
                    console.error("Error al guardar en base de datos online:", e);
                }
            }

            tickets.unshift(newTicket); // Add to local state (at the beginning)
            localStorage.setItem('chubut_tickets', JSON.stringify(tickets));

            setTimeout(() => {
                closeModal();
                showTab('tickets');
                renderTickets();
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }, 1200);
        }

        init();
    </script>
</body>
</html>
